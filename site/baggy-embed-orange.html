<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Baggy - WF Modding Companion</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  background: #1a1a1a;
  color: #fff;
  font-size: 14px;
  height: 100vh;
  overflow: hidden;
}

.baggy-container {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  background: #1a1a1a;
  border: 2px solid #ff8800;
  box-shadow: 0 0 20px rgba(255, 136, 0, 0.3);
  position: relative;
}

.header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px;
  background: linear-gradient(180deg, #2a2a2a, #1a1a1a);
  border-bottom: 1px solid #333;
}

#logo {
  width: 32px;
  height: 32px;
}

.title-group .title {
  font-weight: 600;
  font-size: 1.4em;
  color: #ff8800;
  text-shadow: 0 0 8px rgba(255, 136, 0, 0.4);
}

.title-group .subtitle {
  font-size: 1.2em;
  color: #ddd;
}

.sidebar-content {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  position: relative;
}

.search {
  width: 100%;
  padding: 10px;
  margin-bottom: 12px;
  border-radius: 4px;
  background: #111;
  border: 1px solid #333;
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  font-size: 1em;
}

.search::placeholder { color: #666; }

.search:focus {
  outline: none;
  border-color: #ff8800;
  box-shadow: 0 0 10px rgba(255, 136, 0, 0.4);
}

.card {
  background: #2a2a2a;
  padding: 12px;
  border-radius: 8px;
  margin-bottom: 12px;
  border: 1px solid #333;
  box-shadow: 0 4px 8px rgba(0, 0, 0, 0.4);
}

.card-title {
  margin: 0 0 10px;
  font-weight: 600;
  font-size: 1.2em;
  display: flex;
  align-items: center;
  gap: 8px;
  color: #fff;
  cursor: pointer;
  user-select: none;
}

.card-title:hover {
  color: #ff8800;
  text-shadow: 0 0 8px rgba(255, 136, 0, 0.4);
}

.icon-img {
  width: 16px;
  height: 16px;
}

.click-panel, .info-panel {
  display: none;
  margin-top: 8px;
  padding: 8px;
  background: #111;
  border-radius: 4px;
  border: 1px solid #222;
}

.card.open .click-panel,
.card.open .info-panel {
  display: block;
}

.sublink {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 8px;
  border-radius: 4px;
  text-decoration: none;
  color: #fff;
  font-size: 1em;
  transition: all 0.15s ease;
}

.sublink:hover {
  background: #333;
  color: #ff8800;
  transform: translateX(2px);
}

.info-subtoggle {
  width: 100%;
  background: #2a2a2a;
  padding: 8px;
  border-radius: 4px;
  margin-top: 6px;
  text-align: left;
  color: #fff;
  border: 1px solid #333;
  cursor: pointer;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  font-size: 1.1em;
  display: flex;
  align-items: center;
  gap: 6px;
}

.info-subtoggle:hover {
  background: #333;
  border-color: #ff8800;
  color: #ff8800;
}

.dynamic-list {
  list-style: none;
  padding-left: 10px;
  margin: 4px 0;
  display: none;
}

.dynamic-list li {
  padding: 4px 6px;
  border-radius: 4px;
  cursor: pointer;
  color: #fff;
  font-size: 1em;
  position: relative;
}

.dynamic-list li:hover {
  background: #333;
  color: #ff8800;
}

.footer {
  text-align: center;
  padding: 10px;
  color: #fff;
  font-size: 1em;
  border-top: 1px solid #333;
  background: #111;
}

.footer a {
  color: #ff8800;
  text-decoration: none;
}

.footer a:hover {
  text-shadow: 0 0 8px rgba(255, 136, 0, 0.4);
}

.sidebar-content::-webkit-scrollbar { width: 8px; }
.sidebar-content::-webkit-scrollbar-track { background: #111; }
.sidebar-content::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
.sidebar-content::-webkit-scrollbar-thumb:hover { background: #ff8800; }

.track-header {
  cursor: pointer;
  position: relative;
}

.track-header::before {
  content: "▶";
  margin-right: 5px;
  color: #ff8800;
  transition: transform 0.2s;
}

.dynamic-list li.expanded .track-header::before { transform: rotate(90deg); }

.variations-list {
  list-style: none;
  padding-left: 15px;
  margin: 4px 0 0 0;
  display: none;
}

.dynamic-list li.expanded .variations-list { display: block; }

.variation-item {
  padding: 3px 6px;
  font-size: 1em;
  color: #fff;
  border-left: 2px solid #333;
  margin: 2px 0;
  position: relative;
}

.variation-item:hover {
  background: #333;
  border-left-color: #ff8800;
  color: #ff8800;
}

.preview-img { display: none; }
.preview-caption { display: none; }

/* Loading animation */
.loader {
  --w: 10ch;
  font-weight: bold;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  font-size: 0.9em;
  line-height: 1.4em;
  letter-spacing: var(--w);
  width: var(--w);
  overflow: hidden;
  white-space: nowrap;
  color: #0000;
  display: inline-block;
  vertical-align: middle;
  text-shadow:
    calc(0*var(--w)) 0 #fff,calc(-1*var(--w)) 0 #fff,calc(-2*var(--w)) 0 #fff,calc(-3*var(--w)) 0 #fff,calc(-4*var(--w)) 0 #fff,
    calc(-5*var(--w)) 0 #fff,calc(-6*var(--w)) 0 #fff,calc(-7*var(--w)) 0 #fff,calc(-8*var(--w)) 0 #fff,calc(-9*var(--w)) 0 #fff;
  animation: l20 2s infinite linear;
}
.loader:before { content: "Loading..."; }
@keyframes l20 {
  9.09%  {text-shadow: calc(0*var(--w)) -10px #fff,calc(-1*var(--w)) 0 #fff,calc(-2*var(--w)) 0 #fff,calc(-3*var(--w)) 0 #fff,calc(-4*var(--w)) 0 #fff,calc(-5*var(--w)) 0 #fff,calc(-6*var(--w)) 0 #fff,calc(-7*var(--w)) 0 #fff,calc(-8*var(--w)) 0 #fff,calc(-9*var(--w)) 0 #fff}
  18.18% {text-shadow: calc(0*var(--w)) 0 #fff,calc(-1*var(--w)) -10px #fff,calc(-2*var(--w)) 0 #fff,calc(-3*var(--w)) 0 #fff,calc(-4*var(--w)) 0 #fff,calc(-5*var(--w)) 0 #fff,calc(-6*var(--w)) 0 #fff,calc(-7*var(--w)) 0 #fff,calc(-8*var(--w)) 0 #fff,calc(-9*var(--w)) 0 #fff}
  27.27% {text-shadow: calc(0*var(--w)) 0 #fff,calc(-1*var(--w)) 0 #fff,calc(-2*var(--w)) -10px #fff,calc(-3*var(--w)) 0 #fff,calc(-4*var(--w)) 0 #fff,calc(-5*var(--w)) 0 #fff,calc(-6*var(--w)) 0 #fff,calc(-7*var(--w)) 0 #fff,calc(-8*var(--w)) 0 #fff,calc(-9*var(--w)) 0 #fff}
  36.36% {text-shadow: calc(0*var(--w)) 0 #fff,calc(-1*var(--w)) 0 #fff,calc(-2*var(--w)) 0 #fff,calc(-3*var(--w)) -10px #fff,calc(-4*var(--w)) 0 #fff,calc(-5*var(--w)) 0 #fff,calc(-6*var(--w)) 0 #fff,calc(-7*var(--w)) 0 #fff,calc(-8*var(--w)) 0 #fff,calc(-9*var(--w)) 0 #fff}
  45.45% {text-shadow: calc(0*var(--w)) 0 #fff,calc(-1*var(--w)) 0 #fff,calc(-2*var(--w)) 0 #fff,calc(-3*var(--w)) 0 #fff,calc(-4*var(--w)) -10px #fff,calc(-5*var(--w)) 0 #fff,calc(-6*var(--w)) 0 #fff,calc(-7*var(--w)) 0 #fff,calc(-8*var(--w)) 0 #fff,calc(-9*var(--w)) 0 #fff}
  54.54% {text-shadow: calc(0*var(--w)) 0 #fff,calc(-1*var(--w)) 0 #fff,calc(-2*var(--w)) 0 #fff,calc(-3*var(--w)) 0 #fff,calc(-4*var(--w)) 0 #fff,calc(-5*var(--w)) -10px #fff,calc(-6*var(--w)) 0 #fff,calc(-7*var(--w)) 0 #fff,calc(-8*var(--w)) 0 #fff,calc(-9*var(--w)) 0 #fff}
  63.63% {text-shadow: calc(0*var(--w)) 0 #fff,calc(-1*var(--w)) 0 #fff,calc(-2*var(--w)) 0 #fff,calc(-3*var(--w)) 0 #fff,calc(-4*var(--w)) 0 #fff,calc(-5*var(--w)) 0 #fff,calc(-6*var(--w)) -10px #fff,calc(-7*var(--w)) 0 #fff,calc(-8*var(--w)) 0 #fff,calc(-9*var(--w)) 0 #fff}
  72.72% {text-shadow: calc(0*var(--w)) 0 #fff,calc(-1*var(--w)) 0 #fff,calc(-2*var(--w)) 0 #fff,calc(-3*var(--w)) 0 #fff,calc(-4*var(--w)) 0 #fff,calc(-5*var(--w)) 0 #fff,calc(-6*var(--w)) 0 #fff,calc(-7*var(--w)) -10px #fff,calc(-8*var(--w)) 0 #fff,calc(-9*var(--w)) 0 #fff}
  81.81% {text-shadow: calc(0*var(--w)) 0 #fff,calc(-1*var(--w)) 0 #fff,calc(-2*var(--w)) 0 #fff,calc(-3*var(--w)) 0 #fff,calc(-4*var(--w)) 0 #fff,calc(-5*var(--w)) 0 #fff,calc(-6*var(--w)) 0 #fff,calc(-7*var(--w)) 0 #fff,calc(-8*var(--w)) -10px #fff,calc(-9*var(--w)) 0 #fff}
  90.90% {text-shadow: calc(0*var(--w)) 0 #fff,calc(-1*var(--w)) 0 #fff,calc(-2*var(--w)) 0 #fff,calc(-3*var(--w)) 0 #fff,calc(-4*var(--w)) 0 #fff,calc(-5*var(--w)) 0 #fff,calc(-6*var(--w)) 0 #fff,calc(-7*var(--w)) 0 #fff,calc(-8*var(--w)) 0 #fff,calc(-9*var(--w)) -10px #fff}
}

#preview-box {
  background: #1a1a1a;
  border: 3px solid #ff8800;
  box-shadow: 0 8px 24px rgba(0,0,0,0.9), 0 0 30px rgba(255,136,0,0.4);
}
#preview-box span {
  color: #ff8800;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  text-shadow: 0 0 6px rgba(255,136,0,0.4);
}

</style>
</head>
<body>
  <div class="baggy-container">
    <header class="header">
      <img id="logo" src="https://strmods.github.io/assets/Baggy-alt.png" alt="Baggy">
      <div class="title-group">
        <div class="title">Baggy</div>
        <div class="subtitle">WF modding companion</div>
      </div>
    </header>

    <div class="sidebar-content">
      <form id="wikiSearchForm" action="https://tads.me.uk/wfwiki/index.php" method="get" target="_blank">
        <input class="search" name="search" placeholder="Search WF modding wiki" />
      </form>

      <div id="baggy-menu-container"></div>
    </div>

    <footer class="footer">
      <small>Created by STRmods</small><br>
      <a href="https://strmods.github.io/" target="_blank">Visit STRmods.github.io →</a>
    </footer>
  </div>

<script src="https://strmods.github.io/site/baggy-cache.js"></script>
<script src="https://strmods.github.io/site/baggy-embed.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', async () => {
    await buildAndInitEmbed('orange');
  });
</script>
<div id="preview-box" style="display:none;position:fixed;width:200px;border-radius:8px;padding:6px 6px 24px 6px;z-index:2147483647;pointer-events:none;text-align:center;">
  <img id="preview-img" src="" alt="" style="width:100%;height:auto;border-radius:4px;display:block;">
  <span id="preview-caption" style="display:block;position:absolute;bottom:5px;left:0;width:100%;padding:0 6px;text-align:center;font-size:0.78em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"></span>
</div>
</body>
</html>
